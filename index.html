<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Budget Pro Max V2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary: #4361ee; --secondary: #3f37c9; --success: #4cc9f0; --danger: #f72585;
            --bg: #f8f9fa; --card: #ffffff; --text: #2b2d42; --border: #eeeeee;
        }
        body.dark-mode {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; transition: 0.2s; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; font-size: 14px; }
        
        /* Views */
        .view { display: none; height: calc(100vh - 65px); width: 100%; padding: 15px; overflow-y: auto; flex-direction: column; }
        .view.active { display: flex; }
        
        /* UI Components */
        .card { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        
        /* Profile Pic */
        .upload-circle { width: 90px; height: 90px; border-radius: 50%; background: #e0e7ff; margin: 10px auto; border: 2px dashed var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; }
        .upload-circle img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { text-align: center; color: #8d99ae; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }

        /* Ranking UI */
        .rank-card { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 10px; }
        .rank-symbol { font-size: 22px; width: 40px; text-align: center; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        /* Modal Settings */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:4000; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 450px; border-radius: 20px; padding: 20px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; color: var(--text); }
    </style>
</head>
<body>

    <div id="auth-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
        <div class="card" style="width: 90%; max-width: 400px; text-align: center;">
            <h2 style="color:var(--primary); margin-bottom: 10px;">Family Budget</h2>
            <div id="signup-fields" style="display:none;">
                <div class="upload-circle" onclick="document.getElementById('profile-file').click()">
                    <i class="fas fa-camera" id="camera-icon"></i>
                    <img id="preview-img" style="display:none">
                </div>
                <input type="file" id="profile-file" hidden accept="image/*" onchange="handleImageUpload(this, 'preview-img', 'camera-icon')">
                <div class="input-group"><label>Name</label><input type="text" id="reg-name"></div>
            </div>
            <div class="input-group"><label>Phone</label><input type="text" id="auth-phone"></div>
            <div class="input-group"><label>Password</label><input type="password" id="auth-pass"></div>
            <button class="btn" style="width:100%" onclick="handleAuth()">Submit</button>
            <p style="margin-top:15px; font-size:12px; color:var(--primary); cursor:pointer" onclick="toggleAuthMode()" id="auth-link">New User? Create Account</p>
        </div>
    </div>

    <div id="view-dashboard" class="view active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>📊 Dashboard</h3>
            <div style="display: flex; gap: 20px; align-items: center;">
                <i class="fas fa-users" style="font-size: 22px; color: var(--primary); cursor: pointer;" onclick="openFamilyModal()"></i>
                <i class="fas fa-moon" id="dark-btn" style="font-size: 22px; cursor: pointer;" onclick="toggleDarkMode()"></i>
            </div>
        </div>
        
        <div id="pdf-content">
            <div class="card" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white;">
                <small>Family Total Spending</small>
                <h1 id="total-monthly-spend">₹ 0</h1>
            </div>
            <h4>Spenders Ranking</h4>
            <div id="ranking-list"></div>
            <div class="card"><canvas id="budgetChart" height="200"></canvas></div>
        </div>
        <button class="btn" onclick="exportPDF()" style="background:var(--success);"><i class="fas fa-file-pdf"></i> Download Report</button>
    </div>

    <div id="view-entry" class="view">
        <h3>💸 New Entry & History</h3>
        <div class="card">
            <div class="input-group"><label>Item</label><input type="text" id="exp-name"></div>
            <div class="input-group"><label>Amount (₹)</label><input type="number" id="exp-amount"></div>
            <div style="display:flex; gap:10px;">
                <div style="flex:1" class="input-group"><label>Category</label><select id="exp-cat"><option>Grocery</option><option>Bills</option><option>Other</option></select></div>
                <div style="flex:1" class="input-group"><label>Privacy</label><select id="exp-private"><option value="false">Public</option><option value="true">Private</option></select></div>
            </div>
            <button class="btn" style="width:100%" onclick="saveExpense()">Save</button>
        </div>
        <h4>Recent History</h4>
        <div id="expense-history"></div>
    </div>

    <div id="view-tasks" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>📋 Lists</h3>
            <button onclick="document.getElementById('list-modal').style.display='flex'" class="btn" style="padding:5px 15px;">+ Create</button>
        </div>
        <div id="task-list-container" style="margin-top:10px;"></div>
    </div>

    <div id="view-profile" class="view">
        <h3>👤 Profile</h3>
        <div class="card" style="text-align: center;">
            <div class="upload-circle" onclick="document.getElementById('edit-file').click()">
                <img id="prof-img">
            </div>
            <input type="file" id="edit-file" hidden accept="image/*" onchange="handleImageUpload(this, 'prof-img', null)">
            <div class="input-group"><label>Name</label><input type="text" id="edit-name"></div>
            <button class="btn" style="width:100%" onclick="updateProfile()">Update Info</button>
            <p style="margin-top:15px; font-size:12px; color:gray">Code: <b id="prof-code" style="color:var(--primary)"></b></p>
            <button class="btn" style="background:var(--danger); width:100%; margin-top:15px;" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="family-modal" class="modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeModal('family-modal')"></i>
            <h4>Family Group</h4>
            <div class="input-group" style="margin-top:15px;">
                <label>Add Member (Enter Code)</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="target-code" placeholder="EX: A1B2C3">
                    <button class="btn" onclick="sendRequest()">Send</button>
                </div>
            </div>
            <hr style="margin:15px 0; opacity:0.1;">
            <h5>Pending Requests</h5>
            <div id="request-list"></div>
            <h5 style="margin-top:15px;">Connected Members</h5>
            <div id="member-list"></div>
        </div>
    </div>

    <div id="list-modal" class="modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeModal('list-modal')"></i>
            <h4>Create Shopping List</h4>
            <div id="temp-items" style="margin:10px 0; font-size:12px;"></div>
            <div class="input-group"><input type="text" id="t-name" placeholder="Item Name"></div>
            <div class="input-group"><input type="text" id="t-qty" placeholder="Quantity"></div>
            <div class="input-group"><label>Privacy</label><select id="t-private"><option value="false">Public</option><option value="true">Private</option></select></div>
            <button class="btn" style="width:100%; background:#666;" onclick="addToTempList()">+ Add Item</button>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="submitFinalList()">Send List to Family</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchView('dashboard', this)"><i class="fas fa-chart-pie"></i>Home</div>
        <div class="nav-item" onclick="switchView('entry', this)"><i class="fas fa-plus-circle"></i>Add</div>
        <div class="nav-item" onclick="switchView('tasks', this)"><i class="fas fa-shopping-basket"></i>Lists</div>
        <div class="nav-item" onclick="switchView('profile', this)"><i class="fas fa-user-circle"></i>User</div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCikJiVhp8kq5iSzyktKip-19TDBth2BLg",
            authDomain: "familybudgetapp-7cd6f.firebaseapp.com",
            projectId: "familybudgetapp-7cd6f",
            storageBucket: "familybudgetapp-7cd6f.firebasestorage.app",
            messagingSenderId: "716849659548",
            appId: "1:716849659548:web:915bf1de4669b386ea3759",
            databaseURL: "https://familybudgetapp-7cd6f-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        let currentUser = null, userData = {}, isSignUp = false, myChart = null, tempItems = [], base64Pic = "";

        // --- DARK MODE FIX ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('dark-btn').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('familyBudgetTheme', isDark ? 'dark' : 'light');
        }
        if(localStorage.getItem('familyBudgetTheme') === 'dark') toggleDarkMode();

        // --- MODAL FIX ---
        function openFamilyModal() { 
            document.getElementById('family-modal').style.display = 'flex'; 
            loadRequests(); 
            loadMembers();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- IMAGE HANDLER ---
        function handleImageUpload(input, imgId, iconId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    if(iconId) document.getElementById(iconId).style.display = 'none';
                    base64Pic = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- AUTH ---
        function toggleAuthMode() { 
            isSignUp = !isSignUp; 
            document.getElementById('signup-fields').style.display = isSignUp ? 'block' : 'none';
            document.getElementById('auth-link').innerText = isSignUp ? "Already User? Login" : "New User? Create Account";
        }
        async function handleAuth() {
            const p = document.getElementById('auth-phone').value, ps = document.getElementById('auth-pass').value;
            const e = p + "@familyapp.com";
            try {
                if(isSignUp) {
                    const res = await auth.createUserWithEmailAndPassword(e, ps);
                    const code = Math.random().toString(36).substring(2,8).toUpperCase();
                    await db.ref('users/'+res.user.uid).set({ 
                        uid:res.user.uid, name:document.getElementById('reg-name').value, 
                        phone:p, familyId:res.user.uid, familyCode:code, dp: base64Pic || '' 
                    });
                } else await auth.signInWithEmailAndPassword(e, ps);
            } catch(err) { alert(err.message); }
        }
        auth.onAuthStateChanged(user => { 
            if(user) { currentUser=user; document.getElementById('auth-screen').style.display='none'; init(); } 
            else document.getElementById('auth-screen').style.display='flex'; 
        });

        // --- CORE DATA ---
        function init() {
            db.ref('users/'+currentUser.uid).on('value', snap => {
                userData = snap.val(); if(!userData) return;
                document.getElementById('prof-img').src = userData.dp || 'https://via.placeholder.com/80';
                document.getElementById('edit-name').value = userData.name;
                document.getElementById('prof-code').innerText = userData.familyCode;
                sync();
            });
        }

        function sync() {
            db.ref('expenses').orderByChild('familyId').equalTo(userData.familyId).on('value', snap => {
                const data = Object.values(snap.val() || {});
                renderRanking(data);
                renderHistory(data);
            });
            db.ref('tasks').orderByChild('familyId').equalTo(userData.familyId).on('value', snap => renderTasks(snap.val() || {}));
        }

        // --- RANKING LOGIC ---
        function renderRanking(exps) {
            let total = 0; const spends = {}; const cats = {};
            exps.forEach(e => {
                const amt = parseFloat(e.amount); total += amt;
                spends[e.userId] = (spends[e.userId] || 0) + amt;
                const cName = (e.isPrivate && e.userId !== currentUser.uid) ? "Private" : e.category;
                cats[cName] = (cats[cName] || 0) + amt;
            });
            document.getElementById('total-monthly-spend').innerText = "₹ " + total.toLocaleString();
            
            db.ref('users').once('value', uSnap => {
                const users = uSnap.val();
                const sorted = Object.entries(spends).sort((a,b)=>b[1]-a[1]);
                const syms = ['🐂','🏠','🦁','🐻'];
                let h = "";
                sorted.forEach(([uid, amt], i) => {
                    const u = users[uid];
                    h += `<div class="card rank-card">
                        <div class="rank-symbol">${syms[i]||'👤'}</div>
                        <img src="${u.dp || 'https://via.placeholder.com/40'}" class="avatar">
                        <div style="flex:1"><b>${u.name}</b><br><small>Rank #${i+1}</small></div>
                        <b>₹${amt}</b>
                    </div>`;
                });
                document.getElementById('ranking-list').innerHTML = h;
            });
            updateChart(cats);
        }

        function updateChart(cats) {
            const ctx = document.getElementById('budgetChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#4361ee','#f72585','#4cc9f0','#ff9f1c','#7209b7'] }] },
                options: { maintainAspectRatio:false }
            });
        }

        // --- EXPENSES ---
        function saveExpense() {
            const n = document.getElementById('exp-name').value, a = document.getElementById('exp-amount').value;
            if(!n || !a) return;
            db.ref('expenses').push({
                itemName: n, amount: a, category: document.getElementById('exp-cat').value,
                isPrivate: document.getElementById('exp-private').value === 'true',
                familyId: userData.familyId, userId: currentUser.uid, userName: userData.name, timestamp: Date.now()
            });
            document.getElementById('exp-name').value=""; document.getElementById('exp-amount').value="";
        }

        function renderHistory(exps) {
            let h = "";
            exps.slice().reverse().forEach(e => {
                const title = (e.isPrivate && e.userId !== currentUser.uid) ? "Secret Item" : e.itemName;
                h += `<div class="card" style="display:flex; justify-content:space-between; padding:10px;">
                    <div><b>${title}</b><br><small>${e.userName}</small></div>
                    <b>₹${e.amount}</b>
                </div>`;
            });
            document.getElementById('expense-history').innerHTML = h;
        }

        // --- LISTS ---
        function addToTempList() {
            const n = document.getElementById('t-name').value, q = document.getElementById('t-qty').value;
            if(!n) return;
            tempItems.push({ name: n, qty: q, isPrivate: document.getElementById('t-private').value==='true', bought: false });
            document.getElementById('temp-items').innerHTML += `• ${n} (${q}) <br>`;
            document.getElementById('t-name').value=""; document.getElementById('t-qty').value="";
        }
        function submitFinalList() {
            if(tempItems.length === 0) return;
            db.ref('tasks').push({ familyId: userData.familyId, createdBy: userData.name, creatorId: currentUser.uid, items: tempItems, timestamp: Date.now() });
            tempItems = []; document.getElementById('temp-items').innerHTML=""; closeModal('list-modal');
        }
        function renderTasks(ts) {
            const container = document.getElementById('task-list-container');
            container.innerHTML = "";
            Object.entries(ts).reverse().forEach(([id, t]) => {
                let h = `<div class="card"><small>By ${t.createdBy}</small>`;
                t.items.forEach((it, i) => {
                    const title = (it.isPrivate && t.creatorId !== currentUser.uid) ? "Private" : it.name;
                    h += `<div style="padding:8px 0; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" ${it.bought?'checked':''} onchange="tickItem('${id}', ${i}, this.checked)">
                        <span style="${it.bought?'text-decoration:line-through; opacity:0.5':''}">${title} (${it.qty})</span>
                    </div>`;
                });
                container.innerHTML += h + `</div>`;
            });
        }
        async function tickItem(tid, idx, check) {
            if(!check) return;
            const price = prompt("Per unit price?");
            const newQty = prompt("Edit Qty if needed:");
            if(price) {
                const snap = await db.ref(`tasks/${tid}`).once('value');
                const it = snap.val().items[idx];
                const finalTotal = parseFloat(price) * (parseFloat(newQty) || 1);
                db.ref('expenses').push({
                    itemName: it.name, amount: finalTotal, category: 'Grocery',
                    familyId: userData.familyId, userId: currentUser.uid, userName: userData.name, isPrivate: it.isPrivate, timestamp: Date.now()
                });
                db.ref(`tasks/${tid}/items/${idx}`).update({ bought: true });
            }
        }

        // --- FAMILY REQUESTS ---
        async function sendRequest() {
            const code = document.getElementById('target-code').value.toUpperCase();
            const snap = await db.ref('users').orderByChild('familyCode').equalTo(code).once('value');
            if(!snap.exists()) return alert("Code not found");
            const target = Object.values(snap.val())[0];
            db.ref('requests/'+target.uid+'/'+currentUser.uid).set({ fromName: userData.name, fromId: currentUser.uid });
            alert("Request Sent!");
        }
        function loadRequests() {
            db.ref('requests/'+currentUser.uid).on('value', snap => {
                let h = "";
                Object.values(snap.val() || {}).forEach(r => {
                    h += `<div class="member-row" style="display:flex; justify-content:space-between; padding:5px;">
                        <span>${r.fromName} wants to join</span>
                        <button class="btn" style="padding:2px 10px; background:var(--success)" onclick="acceptMember('${r.fromId}')">Accept</button>
                    </div>`;
                });
                document.getElementById('request-list').innerHTML = h || "No requests";
            });
        }
        function loadMembers() {
            db.ref('users').on('value', snap => {
                let h = "";
                Object.values(snap.val() || {}).forEach(u => {
                    if(u.familyId === userData.familyId && u.uid !== currentUser.uid) {
                        h += `<div class="member-row" style="display:flex; justify-content:space-between; margin-top:5px;">
                            <span>${u.name}</span>
                            <button class="btn" style="padding:2px 10px; background:var(--danger)" onclick="disconnect('${u.uid}')">Remove</button>
                        </div>`;
                    }
                });
                document.getElementById('member-list').innerHTML = h;
            });
        }
        async function acceptMember(id) {
            await db.ref('users/'+id).update({ familyId: userData.familyId });
            await db.ref('requests/'+currentUser.uid+'/'+id).remove();
        }
        function disconnect(id) { db.ref('users/'+id).update({ familyId: id }); }

        // --- OTHER ---
        function updateProfile() {
            db.ref('users/'+currentUser.uid).update({ 
                name: document.getElementById('edit-name').value, 
                dp: base64Pic || userData.dp 
            });
            alert("Updated!");
        }
        function switchView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active'); el.classList.add('active');
        }
        function logout() { auth.signOut(); location.reload(); }
    </script>
</body>
</html>
