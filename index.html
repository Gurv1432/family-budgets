<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Family Budget Pro</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6ff;
margin:0;
}

header{
background:#4361ee;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#4361ee;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

.expense-item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #eee;
padding:8px;
}

</style>

</head>

<body>

<header>
<h2>Family Budget App</h2>
</header>

<div class="container">

<div class="card">

<h3>Add Expense</h3>

<input id="name" placeholder="Item name">

<input id="amount" type="number" placeholder="Amount">

<select id="category">
<option>Food</option>
<option>Fuel</option>
<option>Bills</option>
<option>Shopping</option>
</select>

<button onclick="addExpense()">Save</button>

</div>


<div class="card">

<h3>Total Spend</h3>

<h2 id="total">₹0</h2>

<p id="ai"></p>

</div>


<div class="card">

<h3>Expense History</h3>

<div id="history"></div>

</div>


<div class="card">

<h3>Reports</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<button onclick="exportExcel()">Export Excel</button>

</div>


<div class="card">

<button id="installBtn" style="display:none;">Install App</button>

</div>

</div>


<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function save(){

localStorage.setItem("expenses",JSON.stringify(expenses));

}

function addExpense(){

let name=document.getElementById("name").value;
let amount=document.getElementById("amount").value;
let cat=document.getElementById("category").value;

if(!name || !amount) return;

expenses.push({name,amount,cat});

save();

render();

}

function render(){

let total=0;
let html="";
let catData={};

expenses.forEach(e=>{

total+=parseFloat(e.amount);

html+=`
<div class="expense-item">
<span>${e.name}</span>
<b>₹${e.amount}</b>
</div>
`;

catData[e.cat]=(catData[e.cat]||0)+parseFloat(e.amount);

});

document.getElementById("history").innerHTML=html;

document.getElementById("total").innerText="₹"+total;

document.getElementById("ai").innerText=aiSuggestion(total);

drawChart(catData);

}

function aiSuggestion(total){

if(total>5000) return "⚠ Spending high";

if(total>3000) return "Budget getting high";

return "Budget under control";

}

function drawChart(data){

let ctx=document.getElementById("chart");

new Chart(ctx,{

type:"doughnut",

data:{

labels:Object.keys(data),

datasets:[{

data:Object.values(data),

backgroundColor:["#4361ee","#f72585","#4cc9f0","#ff9f1c"]

}]

}

});

}

function exportExcel(){

let ws=XLSX.utils.json_to_sheet(expenses);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Expenses");

XLSX.writeFile(wb,"family_budget.xlsx");

}

render();


let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById("installBtn").style.display="block";

});

document.getElementById("installBtn").onclick=()=>{

deferredPrompt.prompt();

};


if('serviceWorker' in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
